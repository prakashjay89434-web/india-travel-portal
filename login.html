<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — India Travel Portal</title>
    <link rel="stylesheet" href="style.css" />
</head>
    <body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🗺️ India Travel</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="#">Bookings</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- LOGIN SECTION -->
  <section class="auth-section">

    <div class="auth-box">

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab">Login</button>
        <button class="tab-btn" id="signupTab">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="auth-form" id="loginForm">
        <h2>Welcome Back! 👋</h2>
        <p class="auth-subtitle">Login to book your dream destination</p>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" id="loginEmail"/>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" id="loginPassword"/>
        </div>

        <button class="auth-btn" id="loginBtn">Login →</button>
        <p class="auth-msg" id="loginMsg"></p>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-form hidden" id="signupForm">
        <h2>Create Account! 🚀</h2>
        <p class="auth-subtitle">Join us and explore Incredible India</p>

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" id="signupName"/>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" id="signupEmail"/>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" id="signupPassword"/>
        </div>

        <button class="auth-btn" id="signupBtn">Create Account →</button>
        <p class="auth-msg" id="signupMsg"></p>
      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 India Travel Portal | Made with Jay prakash </p>
  </footer>

  <script src="login.js"></script>
</body>
</html>
