<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed — India Travel Portal</title>
<link rel="stylesheet" href="style.css" />
</head>
<>
    <body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🗺️ India Travel</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="#">Bookings</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- CONFIRMATION SECTION -->
  <section class="confirm-section">

    <div class="confirm-box">

      <!-- SUCCESS ICON -->
      <div class="success-icon">✅</div>

      <h1>Booking Confirmed!</h1>
      <p class="confirm-subtitle">
        Your trip has been successfully booked!
      </p>

      <!-- BOOKING DETAILS -->
      <div class="booking-details">

        <div class="detail-row">
          <span class="detail-label">Booking ID</span>
          <span class="detail-value" id="bookingId">—</span>
        </div>

        <div class="detail-row">
          <span class="detail-label">Destination</span>
          <span class="detail-value" id="confirmPlace">—</span>
        </div>

        <div class="detail-row">
          <span class="detail-label">Check In</span>
          <span class="detail-value" id="confirmCheckin">—</span>
        </div>

        <div class="detail-row">
          <span class="detail-label">Check Out</span>
          <span class="detail-value" id="confirmCheckout">—</span>
        </div>

        <div class="detail-row">
          <span class="detail-label">Guests</span>
          <span class="detail-value" id="confirmGuests">—</span>
        </div>

        <div class="detail-row total-row">
          <span class="detail-label">Total Amount</span>
          <span class="detail-value" id="confirmAmount">—</span>
        </div>

      </div>

      <!-- BUTTONS -->
      <div class="confirm-btns">
        <button onclick="window.location.href='index.html'" 
                class="home-btn">
          🏠 Go to Home
        </button>
        <button onclick="window.print()" 
                class="print-btn">
          🖨️ Print Ticket
        </button>
      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 India Travel Portal | Made with Jay prakash </p>
  </footer>
  <script src="booking-confirm.js"></script>
</body>
</html>
